---
services:
  database:
    image: "zulip/zulip-postgresql:14"
    restart: unless-stopped
    secrets:
      - zulip__postgres_password
    environment:
      POSTGRES_DB: "zulip"
      POSTGRES_USER: "zulip"
      POSTGRES_PASSWORD_FILE: /run/secrets/zulip__postgres_password
    volumes:
      - "postgresql-14:/var/lib/postgresql/data:rw"
    attach: false

  memcached:
    image: "memcached:alpine"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$(cat $$MEMCACHED_PASSWORD_FILE)" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$(cat $$MEMCACHED_PASSWORD_FILE)" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    secrets:
      - zulip__memcached_password
    environment:
      SASL_CONF_PATH: "/home/memcache/memcached.conf"
      MEMCACHED_SASL_PWDB: "/home/memcache/memcached-sasl-db"
      MEMCACHED_PASSWORD_FILE: /run/secrets/zulip__memcached_password
    attach: false

  rabbitmq:
    image: "rabbitmq:4.2"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        export RABBITMQ_DEFAULT_PASS="$$(cat $$RABBITMQ_PASSWORD_FILE)"
        echo 'default_user = $$(RABBITMQ_DEFAULT_USER)' >> /etc/rabbitmq/rabbitmq.conf
        echo 'default_pass = $$(RABBITMQ_DEFAULT_PASS)' >> /etc/rabbitmq/rabbitmq.conf
        exec docker-entrypoint.sh rabbitmq-server
    secrets:
      - zulip__rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_USER: "zulip"
      RABBITMQ_PASSWORD_FILE: /run/secrets/zulip__rabbitmq_password
    volumes:
      - "rabbitmq:/var/lib/rabbitmq:rw"
    attach: false

  redis:
    image: "redis:alpine"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - '/usr/local/bin/docker-entrypoint.sh --requirepass "$$(cat $$REDIS_PASSWORD_FILE)"'
    secrets:
      - zulip__redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/zulip__redis_password
    volumes:
      - "redis:/data:rw"
    attach: false

  zulip:
    image: "ghcr.io/zulip/zulip-server:12.1-0"
    restart: unless-stopped
    ports:
      - "9080:80"
    extra_hosts:
      - "classattic.exe.xyz:host-gateway"
      - "chat.classattic.com:host-gateway"
    secrets:
      - zulip__postgres_password
      - zulip__memcached_password
      - zulip__rabbitmq_password
      - zulip__redis_password
      - zulip__secret_key
      - zulip__email_password
      - zulip__social_auth_oidc_secret
      - zulip__social_auth_google_key
      - zulip__social_auth_google_secret
    environment:
      # Infrastructure
      SETTING_REMOTE_POSTGRES_HOST: "database"
      SETTING_MEMCACHED_LOCATION: "memcached:11211"
      SETTING_RABBITMQ_HOST: "rabbitmq"
      SETTING_REDIS_HOST: "redis"

      # Core
      SETTING_EXTERNAL_HOST: "chat.classattic.com"
      SETTING_ZULIP_ADMINISTRATOR: "admin@chat.classattic.com"
      CERTIFICATES: ""
      TRUST_GATEWAY_IP: "True"

      # Auth
      ZULIP_AUTH_BACKENDS: "GenericOpenIdConnectBackend,GoogleMobileOauth2Backend"

      # Google OAuth2 — key set via .env; secret loaded via get_secret()
      SETTING_SOCIAL_AUTH_GOOGLE_KEY: "${SOCIAL_AUTH_GOOGLE_KEY}"

      # OIDC IDP config (Python dict, not JSON)
      SETTING_SOCIAL_AUTH_OIDC_ENABLED_IDPS: |
        {
            "exe": {
                "oidc_url": "https://classattic.exe.xyz/_oidc",
                "display_name": "exe.dev",
                "display_icon": None,
                "client_id": "zulip",
                "secret": get_secret("social_auth_oidc_secret"),
                "auto_signup": True,
            }
        }

      # JWT and SSL
      SETTING_SOCIAL_AUTH_OIDC_JWT_ALGORITHMS: '["ES256"]'
      SETTING_SOCIAL_AUTH_OIDC_VERIFY_SSL: "False"
    volumes:
      - "zulip:/data:rw"
      - "./post-setup.d:/data/post-setup.d:ro"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576
    depends_on:
      - database
      - memcached
      - rabbitmq
      - redis

secrets:
  zulip__postgres_password:
    file: ./secrets/postgres_password
  zulip__memcached_password:
    file: ./secrets/memcached_password
  zulip__rabbitmq_password:
    file: ./secrets/rabbitmq_password
  zulip__redis_password:
    file: ./secrets/redis_password
  zulip__secret_key:
    file: ./secrets/secret_key
  zulip__email_password:
    file: ./secrets/email_password
  zulip__social_auth_oidc_secret:
    file: ./secrets/social_auth_oidc_secret
  zulip__social_auth_google_key:
    file: ./secrets/social_auth_google_key
  zulip__social_auth_google_secret:
    file: ./secrets/social_auth_google_secret

volumes:
  zulip:
  postgresql-14:
  rabbitmq:
  redis:
